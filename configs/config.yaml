# RecBench Main Configuration
# 用法：
#   uv run python examples/run_itemcf_demo.py
#   或通过 Python API 构造 ExperimentConfig 后调 run_experiment()

defaults:
  - _self_
  - override hydra/hydra_logging: disabled
  - override hydra/job_logging: disabled

hydra:
  output_subdir: null
  run:
    dir: .

experiment:
  name: "itemcf_demo"
  tags: [baseline, ranking]
  notes: "最小可运行基线"
  track_with: null

data:
  name: "taac2026_data_sample"
  data_dir: "./data"
  split_mode: "temporal"
  split_ratios: [0.8, 0.1, 0.1]
  batch_size: 256
  num_workers: 4
  max_seq_len: 50
  min_seq_len: 2
  neg_sample_count: 4
  min_action_type: 0

model:
  name: "itemcf"
  family: "classical"
  task_type: "ranking"
  problem_type: "implicit_ranking"
  params:
    similarity: cosine
    top_k_neighbors: 50
    recommend_k: 10
    normalize: true

training:
  epochs: 10
  learning_rate: 1.0e-3
  weight_decay: 1.0e-5
  optimizer: "adam"
  scheduler: null
  warmup_epochs: 0
  early_stopping_patience: 5
  gradient_clip_val: null
  mixed_precision: null
  accumulate_grad_batches: 1

evaluation:
  metrics:
    - ndcg@10
    - hit_rate@10
    - recall@10
    - mrr
  ranking_k: [10]
  threshold: 0.5
  generate_curves: false
  statistical_test: null

runtime:
  device: auto
  seed: 42
  deterministic: false
  log_level: INFO
  output_root: ./outputs
  resume_from: null
  fast_dev_run: false
  num_devices: 1
