# MovieLens 1M dataset config
# ~1M ratings, ~6000 users, ~4000 movies
# Task: CTR prediction, ranking

name: "movielens_1m"
data_dir: "./data"
split_ratios: [0.8, 0.1, 0.1]
batch_size: 256
num_workers: 4
max_seq_len: 50
min_seq_len: 5
neg_sample_count: 4

# Features
user_features: ["age", "gender", "occupation"]
item_features: ["genre", "year"]
context_features: ["timestamp"]
