# TAAC 2026 advertising dataset config
# Lightweight sample datasets from Tencent Advertising Algorithm Competition 2026.
# Ideal for local prototyping and debugging.
#
# Available variants:
#   taac2026_data_sample   — TAAC2026/data_sample_1000          (1k rows, 120 cols)
#   taac2026_second_round  — TAAC2026/second_round_sample_1000  (1k rows, 142 cols)
#
# split_mode:
#   "temporal" (默认) — 按 timestamp 时序排序后切分，推荐系统标准做法
#   "random"          — 随机打乱后切分，适用于 CTR/CVR 点式评估等非时序场景
#
# HuggingFace:
#   https://huggingface.co/datasets/TAAC2026/data_sample_1000
#   https://huggingface.co/datasets/TAAC2026/second_round_sample_1000
#
# Reference: arxiv:2311.09544, arxiv:2508.14948

name: "taac2026_second_round"
variant: "second_round"
data_dir: "./data"
split_mode: "temporal"
split_ratios: [0.8, 0.1, 0.1]
batch_size: 256
num_workers: 2
max_seq_len: 50
min_seq_len: 2
neg_sample_count: 4
