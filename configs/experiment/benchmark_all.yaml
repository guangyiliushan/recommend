# Full Benchmark — 当前可运行的全部模型 × 全部适配数据集
#
# 当前真实注册组合（2026-06）:
#   模型: itemcf (非训练, ranking), hyformer (训练, pointwise)
#   数据集: movielens_1m, taac2025_1M, taac2025_10M,
#           taac2026_data_sample, taac2026_second_round
#
# 注意：其余 50+ 模型（DeepFM/SASRec/DCN/ESMM 等）虽文件存在，
# 但 register 装饰器被注释，未生效。待模型实现后再启用。

experiment:
  name: "benchmark_all"
  seed: 42
  device: "auto"
  output_dir: "./outputs"

datasets:
  - "movielens_1m"            # ItemCF 最优适配（经典序列推荐基准）
  - "taac2025_1M"             # ItemCF + HyFormer
  - "taac2025_10M"            # 大规模序列
  - "taac2026_data_sample"    # HyFormer (CTR/CVR)
  - "taac2026_second_round"   # HyFormer (含 domain 序列)

models:
  - { name: "itemcf", family: "classical" }
  - { name: "hyformer", family: "unified" }
