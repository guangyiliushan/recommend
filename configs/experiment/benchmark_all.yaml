# Full Benchmark — All 50+ models across all datasets
# WARNING: This will take a very long time to run.
# Full Benchmark — 当前可运行的全部模型 × 全部数据集
#
# 当前真实可运行组合（2026-06）:
#   模型: itemcf (非训练, ranking), dssm (训练, pointwise)
#   数据集: taac2026_data_sample
#
# 注意：本文件原本引用 50+ 模型（DeepFM/SASRec/DCN/ESMM 等），
# 但绝大多数模型仍为占位或空文件，未注册到 MODEL_REGISTRY。
# 已修正 ItemCF → itemcf (全小写，与注册名一致)。

experiment:
  name: "benchmark_all"
  seed: 42
  device: "auto"
  output_dir: "./outputs"

datasets:
  - "taac2026_data_sample"

models:
  - { name: "itemcf", family: "classical" }
  - { name: "dssm", family: "classical" }
