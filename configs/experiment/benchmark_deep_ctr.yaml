# Benchmark: Deep CTR Era (2016–2019)
# Models: YouTube DNN, Wide&Deep, DeepFM, DIN, DIEN, DLRM
#
# HyFormer 专用数据集（点式 / 表格格式，CTR/CVR 预测）:
#   - taac2026_data_sample:  1k 行 × 120 列（CTR/CVR）
#   - taac2026_second_round: 1k 行 × 142 列（含 domain 序列）
#
# 注意：DeepFM/DIN/DLRM 等占位模型实现前，仅 hyformer 可运行。

experiment:
  name: "benchmark_deep_ctr"
  seed: 42
  device: "auto"
  output_dir: "./outputs"

datasets:
  - "taac2026_data_sample"
  - "taac2026_second_round"

models:
  - name: "hyformer"
    family: "unified"
