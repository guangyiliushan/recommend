# Benchmark: Deep CTR Era (2016–2019)
# Models: YouTube DNN, Wide&Deep, DeepFM, DIN, DIEN, DLRM
#
# 当前状态：DeepFM/DIN/DLRM 等 deep_ctr 模型均为占位实现，
# register 装饰器被注释，未生效。hyformer 作为唯一可用的训练型基线纳入。
# 待 deep_ctr 模型实现后替换。

experiment:
  name: "benchmark_deep_ctr"
  seed: 42
  device: "auto"
  output_dir: "./outputs"

datasets:
  - "taac2026_data_sample"

models:
  - name: "hyformer"
    family: "unified"
