# Benchmark: Classical Era (2001–2015)
# 当前仅 itemcf 已实现（非训练），其余经典模型仍为占位。
# hyformer 虽非 classical 家族，但作为唯一可用的训练型基线纳入。
#
# 数据集：taac2025_1M (序列推荐) + taac2026_data_sample (CTR/CVR)
#
# 用法:
#   python scripts/run_benchmark.py --config configs/experiment/benchmark_classical.yaml

experiment:
  name: "benchmark_classical"
  seed: 42
  device: "auto"
  output_dir: "./outputs"

datasets:
  - "taac2025_1M"
  - "taac2026_data_sample"

models:
  - name: "itemcf"
    family: "classical"
  - name: "hyformer"
    family: "unified"
