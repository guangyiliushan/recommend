# Benchmark: Classical Era (2001–2015)
# 当前仅 itemcf 已实现，其余经典模型仍为占位

experiment:
  name: "benchmark_classical"
  seed: 42
  device: "auto"
  output_dir: "./outputs"

datasets:
  - "taac2026_data_sample"

models:
  - name: "itemcf"
    family: "classical"
    params:
      similarity: cosine
      top_k_neighbors: 50
      recommend_k: 10
      normalize: true
