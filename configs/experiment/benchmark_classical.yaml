# Benchmark: Classical Era (2001–2015)
# 当前仅 itemcf 已实现（非训练），其余经典模型仍为占位。
#
# ItemCF 专用数据集（用户序列格式，有共现矩阵）:
#   - movielens_1m: 经典序列推荐基准，密度 4.2%
#   - taac2025_1M:  大规模广告序列推荐
#
# 用法:
#   python scripts/run_benchmark.py --config configs/experiment/benchmark_classical.yaml

experiment:
  name: "benchmark_classical"
  seed: 42
  device: "auto"
  output_dir: "./outputs"

datasets:
  - "movielens_1m"
  - "taac2025_1M"

models:
  - name: "itemcf"
    family: "classical"
