# @package _global_
model:
  name: hyformer
  family: unified
  # task_type: pointwise
  # problem_type: binary
  params:
    # 任务配置（核心新增）
    task: ctr  # ctr / cvr / binary / multiclass / regression / multitask / ranking
    # multiclass 专用：num_classes: 5
    # multitask 专用：num_tasks: 2  或  sub_tasks: ["ctr", "duration"]

    # 主干网络超参数
    d_model: 64
    emb_dim: 64
    num_queries: 1
    num_hyformer_blocks: 2
    num_heads: 4
    seq_encoder_type: transformer
    hidden_mult: 4
    dropout_rate: 0.01
    seq_top_k: 50
    seq_causal: false
    # action_num: 1  # 通常由 task 自动推导，显式设置时覆盖推导值
    num_time_buckets: 65
    rank_mixer_mode: full
    use_rope: false
    rope_base: 10000.0
    emb_skip_threshold: 0
    seq_id_threshold: 10000
    ns_tokenizer_type: rankmixer
    user_ns_tokens: 0
    item_ns_tokens: 0
