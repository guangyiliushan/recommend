# Dependabot configuration
version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:00"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 5
    cooldown:
      semver-major-days: 14
      semver-minor-days: 7
      semver-patch-days: 3
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      pip-runtime:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
      pip-dev:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
    labels:
      - "dependencies"
      - "python"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "05:30"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 3
    cooldown:
      semver-major-days: 7
      semver-minor-days: 3
      semver-patch-days: 1
    commit-message:
      prefix: "chore(ci)"
    groups:
      github-actions:
        patterns:
          - "*"
    labels:
      - "dependencies"
      - "ci"
