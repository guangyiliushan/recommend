---
name: 部署文档

"on":
  pull_request:
    paths:
      - ".github/workflows/deploy-docs.yml"
      - "docs/**"
      - "zensical.toml"
      - "pyproject.toml"
      - "uv.lock"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-docs.yml"
      - "docs/**"
      - "zensical.toml"
      - "pyproject.toml"
      - "uv.lock"
  workflow_dispatch:

permissions:
  contents: read

env:
  DOCS_PYTHON_VERSION: "3.13"

concurrency:
  group: deploy-docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: 文档构建检查
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 检出仓库
        uses: actions/checkout@v5
        with:
          lfs: true
          persist-credentials: false

      - name: 设置 Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.DOCS_PYTHON_VERSION }}

      - name: 设置 uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: true
          save-cache: false
          cache-dependency-glob: |
            pyproject.toml
            uv.lock
            zensical.toml

      - name: 同步文档工具环境
        shell: bash
        run: |
          for attempt in 1 2 3; do
            uv sync --locked --extra dev --python "${{ env.DOCS_PYTHON_VERSION }}" && break
            if [[ "$attempt" -eq 3 ]]; then
              echo "uv sync failed after ${attempt} attempts" >&2
              exit 1
            fi
            echo "uv sync failed, retrying in 5s (attempt ${attempt}/3)" >&2
            sleep 5
          done

      - name: 严格构建 Zensical 站点
        run: uv run --python "${{ env.DOCS_PYTHON_VERSION }}" zensical build --strict --clean

  deploy:
    name: 部署 GitHub Pages
    if: github.event_name != 'pull_request'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: 检出仓库
        uses: actions/checkout@v5
        with:
          lfs: true
          persist-credentials: false

      - name: 配置 GitHub Pages
        uses: actions/configure-pages@v6

      - name: 设置 Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.DOCS_PYTHON_VERSION }}

      - name: 设置 uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock
            zensical.toml

      - name: 同步文档工具环境
        shell: bash
        run: |
          for attempt in 1 2 3; do
            uv sync --locked --extra dev --python "${{ env.DOCS_PYTHON_VERSION }}" && break
            if [[ "$attempt" -eq 3 ]]; then
              echo "uv sync failed after ${attempt} attempts" >&2
              exit 1
            fi
            echo "uv sync failed, retrying in 5s (attempt ${attempt}/3)" >&2
            sleep 5
          done

      - name: 严格构建 Zensical 站点
        run: uv run --python "${{ env.DOCS_PYTHON_VERSION }}" zensical build --strict --clean

      - name: 上传站点制品
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

      - name: 部署 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
