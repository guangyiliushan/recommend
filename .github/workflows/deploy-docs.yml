---
name: 部署文档

"on":
  pull_request:
    paths:
      - ".github/workflows/deploy-docs.yml"
      - "docs/**"
      - "zensical.toml"
      - "pyproject.toml"
      - "uv.lock"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-docs.yml"
      - "docs/**"
      - "zensical.toml"
      - "pyproject.toml"
      - "uv.lock"
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  DOCS_PYTHON_VERSION: "3.13"

concurrency:
  group: deploy-docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: 文档构建检查
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 检出仓库
        uses: actions/checkout@v5
        with:
          lfs: true
          persist-credentials: false

      - name: 设置 Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.DOCS_PYTHON_VERSION }}

      - name: 设置 uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: true
          save-cache: false
          cache-dependency-glob: |
            pyproject.toml
            uv.lock
            zensical.toml

      - name: 同步文档工具环境
        shell: bash
        run: |
          for attempt in 1 2 3; do
            uv sync --locked --extra dev --python "${{ env.DOCS_PYTHON_VERSION }}" && break
            if [[ "$attempt" -eq 3 ]]; then
              echo "uv sync failed after ${attempt} attempts" >&2
              exit 1
            fi
            echo "uv sync failed, retrying in 5s (attempt ${attempt}/3)" >&2
            sleep 5
          done

      - name: 严格构建 Zensical 站点
        run: uv run --python "${{ env.DOCS_PYTHON_VERSION }}" zensical build --strict --clean

  classify-deploy:
    name: 分类部署触发器
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      should_deploy: ${{ steps.classify.outputs.should_deploy }}
      source_ref: ${{ steps.classify.outputs.source_ref }}

    steps:
      - name: 检出仓库以分类推送变更
        if: github.event_name == 'push'
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: 检出仓库以分类 CI 变更
        if: github.event_name == 'workflow_run'
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          persist-credentials: false

      - name: 判断是否部署
        id: classify
        shell: bash
        run: |
          event_name="${{ github.event_name }}"
          sha="${{ github.sha }}"
          should_deploy=true
          source_ref="$sha"

          if [[ "$event_name" == "workflow_run" ]]; then
            source_ref="${{ github.event.workflow_run.head_sha }}"
            conclusion="${{ github.event.workflow_run.conclusion }}"
            if [[ "$conclusion" != "success" ]]; then
              should_deploy=false
            else
              # 仅当成功的 CI 对文档内容或文档构建依赖产生影响时才部署。
              changed_files="$(git show --pretty='' --name-only "$source_ref")"
              should_deploy=false
              while IFS= read -r changed_file; do
                case "$changed_file" in
                  .github/workflows/deploy-docs.yml|docs/*|zensical.toml|pyproject.toml|uv.lock)
                    should_deploy=true
                    break
                    ;;
                esac
              done <<< "$changed_files"
            fi
          elif [[ "$event_name" == "push" ]]; then
            before="${{ github.event.before }}"
            if [[ "$before" =~ ^0+$ ]]; then
              changed_files="$(git show --name-only --format= "$sha")"
            else
              changed_files="$(git diff --name-only "$before" "$sha")"
            fi

            should_deploy=false
            ci_will_rebuild=false
            while IFS= read -r changed_file; do
              case "$changed_file" in
                .github/workflows/deploy-docs.yml|docs/*|zensical.toml|pyproject.toml|uv.lock)
                  should_deploy=true
                  ;;
                .github/workflows/ci.yml|experiments/*|src/*|tests/*|pyproject.toml|uv.lock)
                  ci_will_rebuild=true
                  ;;
              esac
            done <<< "$changed_files"

            if [[ "$ci_will_rebuild" == "true" ]]; then
              # 当 push 也会触发 CI 时，统一交给 workflow_run 在 CI 成功后部署，避免重复发布。
              should_deploy=false
            fi
          elif [[ "$event_name" == "workflow_dispatch" ]]; then
            should_deploy=true
          fi

          echo "should_deploy=$should_deploy" >> "$GITHUB_OUTPUT"
          echo "source_ref=$source_ref" >> "$GITHUB_OUTPUT"

  deploy:
    name: 部署 GitHub Pages
    needs:
      - classify-deploy
    if: needs.classify-deploy.outputs.should_deploy == 'true'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: 检出仓库
        uses: actions/checkout@v5
        with:
          lfs: true
          ref: ${{ needs.classify-deploy.outputs.source_ref }}
          persist-credentials: false

      - name: 配置 GitHub Pages
        uses: actions/configure-pages@v6

      - name: 设置 Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.DOCS_PYTHON_VERSION }}

      - name: 设置 uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock
            zensical.toml

      - name: 同步文档工具环境
        shell: bash
        run: |
          for attempt in 1 2 3; do
            uv sync --locked --extra dev --python "${{ env.DOCS_PYTHON_VERSION }}" && break
            if [[ "$attempt" -eq 3 ]]; then
              echo "uv sync failed after ${attempt} attempts" >&2
              exit 1
            fi
            echo "uv sync failed, retrying in 5s (attempt ${attempt}/3)" >&2
            sleep 5
          done

      - name: 严格构建 Zensical 站点
        run: uv run --python "${{ env.DOCS_PYTHON_VERSION }}" zensical build --strict --clean

      - name: 上传站点制品
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

      - name: 部署 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
