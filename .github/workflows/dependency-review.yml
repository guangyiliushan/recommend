---
name: 依赖审查

"on":
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/dependency-review.yml"
      - ".github/dependabot.yml"
      - "pyproject.toml"
      - "uv.lock"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dependency-review:
    name: 审查依赖变更
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 检出仓库
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: 执行依赖审查
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
