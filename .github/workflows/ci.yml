---
name: CI

"on":
  pull_request:
    paths:
      - ".github/workflows/ci.yml"
      - "experiments/**"
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/ci.yml"
      - "experiments/**"
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
  workflow_dispatch:

permissions:
  contents: read

env:
  CI_CANONICAL_PYTHON_VERSION: "3.13"
  CPU_TEST_MARKERS: "(unit or contract or integration or benchmark_cpu) and not gpu and not benchmark_gpu"
  COVERAGE_SOURCE: "src/taac2026"
  COVERAGE_CPU_SAFE_CORE: "src/taac2026/domain/*,src/taac2026/application/bootstrap/*,src/taac2026/application/evaluation/*,src/taac2026/application/experiments/*,src/taac2026/application/packaging/*,src/taac2026/application/training/*,src/taac2026/infrastructure/bundles/*,src/taac2026/infrastructure/data/*,src/taac2026/infrastructure/experiments/*,src/taac2026/infrastructure/modeling/*,src/taac2026/infrastructure/runtime/*"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: 代码风格与策略
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 检出仓库
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: 设置 Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.CI_CANONICAL_PYTHON_VERSION }}

      - name: 设置 uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: true
          save-cache: false
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: 同步开发工具环境
        shell: bash
        run: |
          for attempt in 1 2 3; do
            uv sync --locked --extra dev --python "${{ env.CI_CANONICAL_PYTHON_VERSION }}" && break
            if [[ "$attempt" -eq 3 ]]; then
              echo "uv sync failed after ${attempt} attempts" >&2
              exit 1
            fi
            echo "uv sync failed, retrying in 5s (attempt ${attempt}/3)" >&2
            sleep 5
          done

      - name: 运行 Ruff 风格检查
        run: uv run --python "${{ env.CI_CANONICAL_PYTHON_VERSION }}" ruff check .

      - name: 运行 Vulture 死代码检查（仅警告）
        continue-on-error: true
        run: uv run --python "${{ env.CI_CANONICAL_PYTHON_VERSION }}" vulture --config pyproject.toml

  compatibility:
    name: 兼容性测试 (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: 检出仓库
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: 设置 Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: 设置 uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: true
          save-cache: false
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: 同步项目环境
        shell: bash
        run: |
          for attempt in 1 2 3; do
            uv sync --locked --extra dev --python "${{ matrix.python-version }}" && break
            if [[ "$attempt" -eq 3 ]]; then
              echo "uv sync failed after ${attempt} attempts" >&2
              exit 1
            fi
            echo "uv sync failed, retrying in 5s (attempt ${attempt}/3)" >&2
            sleep 5
          done

      - name: 运行单元测试
        run: uv run --python "${{ matrix.python-version }}" --with torch==2.7.1 pytest -m "${CPU_TEST_MARKERS}" -v

  coverage:
    name: 覆盖率与主版本测试
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: 检出仓库
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: 设置 Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.CI_CANONICAL_PYTHON_VERSION }}

      - name: 设置 uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: 同步项目环境
        shell: bash
        run: |
          for attempt in 1 2 3; do
            uv sync --locked --extra dev --python "${{ env.CI_CANONICAL_PYTHON_VERSION }}" && break
            if [[ "$attempt" -eq 3 ]]; then
              echo "uv sync failed after ${attempt} attempts" >&2
              exit 1
            fi
            echo "uv sync failed, retrying in 5s (attempt ${attempt}/3)" >&2
            sleep 5
          done

      - name: 运行带有覆盖率的单元测试
        run: >
          uv run --python "${{ env.CI_CANONICAL_PYTHON_VERSION }}" --with torch==2.7.1 --with coverage coverage run
          --data-file=.coverage.cpu --source="${COVERAGE_SOURCE}"
          -m pytest -m "${CPU_TEST_MARKERS}" -v

      - name: 恢复覆盖率数据
        run: cp .coverage.cpu .coverage

      - name: 汇总覆盖率路径
        id: coverage-include
        run: |
          echo "value=${COVERAGE_CPU_SAFE_CORE}" >> "$GITHUB_OUTPUT"

      - name: 总结覆盖率范围
        run: |
          {
            echo "## 覆盖率范围"
            echo
            echo "- 兼容性检查在 Python 3.10, 3.11, 3.12, 和 3.13 上运行"
            echo "- 覆盖率门控从 Python ${CI_CANONICAL_PYTHON_VERSION} 执行"
            echo "- CPU 测试 marker: ${CPU_TEST_MARKERS}"
            echo "- 覆盖率采集 source: ${COVERAGE_SOURCE}"
            echo "- 只统计 CPU 安全模块:"
            IFS=',' read -ra coverage_paths <<< "${COVERAGE_CPU_SAFE_CORE}"
            for coverage_path in "${coverage_paths[@]}"; do
              echo "  - ${coverage_path}"
            done
            echo "- 集成和 GPU 覆盖率在需要时从本地 CUDA CLI 运行中收集"
            echo "- GPU 测试用 pytest -m gpu 在本地 CUDA 环境运行"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: 执行 CPU 覆盖率门控
        run: >
          uv run --python "${{ env.CI_CANONICAL_PYTHON_VERSION }}" coverage report --fail-under=70
          --include="${{ steps.coverage-include.outputs.value }}"

      - name: 导出全 src 覆盖率摘要（非门禁）
        if: always()
        run: >
          uv run --python "${{ env.CI_CANONICAL_PYTHON_VERSION }}" coverage report --fail-under=0
          --include="src/taac2026/*"

      - name: 导出 CPU 覆盖率 XML
        if: always()
        run: >
          uv run --python "${{ env.CI_CANONICAL_PYTHON_VERSION }}" coverage xml --fail-under=0
          -o coverage.xml

      - name: 上传覆盖率制品
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 7
          if-no-files-found: error
