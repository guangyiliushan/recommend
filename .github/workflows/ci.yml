---
name: CI

"on":
  pull_request:
    paths:
      - ".github/workflows/ci.yml"
      - "src/**"
      - "tests/**"
      - "scripts/**"
      - "configs/**"
      - "pyproject.toml"
      - "uv.lock"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/ci.yml"
      - "src/**"
      - "tests/**"
      - "scripts/**"
      - "configs/**"
      - "pyproject.toml"
      - "uv.lock"
  workflow_dispatch:

permissions:
  contents: read

env:
  CI_CANONICAL_PYTHON_VERSION: "3.13"
  COVERAGE_SOURCE: "src/recsys"
  DEFAULT_TEST_SELECTOR: "not integration"
  INTEGRATION_TEST_SELECTOR: "integration"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: 代码风格检查
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 检出仓库
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: 设置 Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.CI_CANONICAL_PYTHON_VERSION }}

      - name: 设置 uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: true
          save-cache: false
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: 同步开发环境
        shell: bash
        run: |
          for attempt in 1 2 3; do
            uv sync --locked --extra dev --python "${{ env.CI_CANONICAL_PYTHON_VERSION }}" && break
            if [[ "$attempt" -eq 3 ]]; then
              echo "uv sync failed after ${attempt} attempts" >&2
              exit 1
            fi
            echo "uv sync failed, retrying in 5s (attempt ${attempt}/3)" >&2
            sleep 5
          done

      - name: 运行 Ruff
        run: uv run --python "${{ env.CI_CANONICAL_PYTHON_VERSION }}" ruff check .

  compatibility:
    name: 兼容性测试 (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: 检出仓库
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: 设置 Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: 设置 uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: true
          save-cache: false
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: 同步项目环境
        shell: bash
        run: |
          for attempt in 1 2 3; do
            uv sync --locked --extra dev --python "${{ matrix.python-version }}" && break
            if [[ "$attempt" -eq 3 ]]; then
              echo "uv sync failed after ${attempt} attempts" >&2
              exit 1
            fi
            echo "uv sync failed, retrying in 5s (attempt ${attempt}/3)" >&2
            sleep 5
          done

      - name: 运行默认测试集
        run: >
          uv run --python "${{ matrix.python-version }}" pytest -v
          -m "${{ env.DEFAULT_TEST_SELECTOR }}"

  integration:
    name: 集成测试 (Python 3.13)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 检出仓库
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: 设置 Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.CI_CANONICAL_PYTHON_VERSION }}

      - name: 设置 uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: true
          save-cache: false
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: 同步项目环境
        shell: bash
        run: |
          for attempt in 1 2 3; do
            uv sync --locked --extra dev --python "${{ env.CI_CANONICAL_PYTHON_VERSION }}" && break
            if [[ "$attempt" -eq 3 ]]; then
              echo "uv sync failed after ${attempt} attempts" >&2
              exit 1
            fi
            echo "uv sync failed, retrying in 5s (attempt ${attempt}/3)" >&2
            sleep 5
          done

      - name: 运行集成测试
        run: >
          uv run --python "${{ env.CI_CANONICAL_PYTHON_VERSION }}" pytest -v
          -m "${{ env.INTEGRATION_TEST_SELECTOR }}"

  coverage:
    name: 覆盖率 (Python 3.13)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 检出仓库
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: 设置 Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.CI_CANONICAL_PYTHON_VERSION }}

      - name: 设置 uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: true
          save-cache: false
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: 同步项目环境
        shell: bash
        run: |
          for attempt in 1 2 3; do
            uv sync --locked --extra dev --python "${{ env.CI_CANONICAL_PYTHON_VERSION }}" && break
            if [[ "$attempt" -eq 3 ]]; then
              echo "uv sync failed after ${attempt} attempts" >&2
              exit 1
            fi
            echo "uv sync failed, retrying in 5s (attempt ${attempt}/3)" >&2
            sleep 5
          done

      - name: 运行覆盖率测试
        run: >
          uv run --python "${{ env.CI_CANONICAL_PYTHON_VERSION }}" pytest -v
          -m "${{ env.DEFAULT_TEST_SELECTOR }}"
          --cov="${{ env.COVERAGE_SOURCE }}"
          --cov-report=term-missing
          --cov-report=xml:coverage.xml

      - name: 上传覆盖率制品
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 7
          if-no-files-found: error
